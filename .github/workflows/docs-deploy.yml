name: Deploy Docs

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Stage docs content
        run: |
          mkdir -p _docs
          cp README.md TOUR.md ROADMAP.md CHANGELOG.md CONTRIBUTING.md AGENTS.md _docs/
          cp -r docs _docs/
          cp -r .ai-interactions _docs/ai-interactions
          cp -r assets _docs/
          cp .github/pages/extra.css _docs/

      - name: Patch staged docs
        run: |
          sed -i 's/<div align="center">/<div align="center" markdown="1">/g' _docs/README.md
          sed -i 's/\.ai-interactions\//ai-interactions\//g' _docs/README.md _docs/TOUR.md

      - name: Generate mkdocs.yml
        run: python3 .github/pages/gen_nav.py _docs > mkdocs.yml

      - name: Build site
        run: mkdocs build --site-dir .site-output

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .site-output
          publish_branch: gh-pages
          force_orphan: true
